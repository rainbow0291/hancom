<!DOCTYPE html>  <!-- HTML 문서 알려주기 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head>       <!-- 화면엔 안 보이는 칸-->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게-->
        <title>
            번호 목록
        </title> <!--브라우저 탭에 뜨는 이름-->
    </head>
    <body>     <!-- 화면에 보이는 내용 칸--> 
        <!-- 번호가 자동으로 붙는 목록(순서가 중요할 때)-->
        <ol>
            <li>먹는것</li>
            <li>자는것</li>
            <li>걷는것</li>
            <ol>
                <li>안녕</li>
                <li>잘가</li>
                <ol type="i">
                    <li>Hello</li>
                    <li>Bye</li>
                </ol>
            </ol>
        </ol>       
    </body>     
</html> 

<!-- <ol>의 사용 -->
<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/ol -->
