<!DOCTYPE html>  <!-- HTML 문서 알려주기 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head>       <!-- 화면엔 안 보이는 칸-->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게-->
        <title>
            줄 및 선
        </title> <!--브라우저 탭에 뜨는 이름-->
    </head>
    <body>     <!-- 화면에 보이는 내용 칸--> 
        <!-- br = 한 문단 안에서 줄 바꾸기 (닫는 태그가 없는 빈 요소)  -->
        <hr>
        <p>첫째 줄<br>둘째 줄</p>
        <hr>
        <p>첫째 줄<br>둘째 줄</p>
        <!-- hr = 내용을 나누는 가로 줄 (닫는 태그가 없는 빈 요소)-->
        <hr>
    </body>
</html>
