<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            시맨틱 구조
        </title>   <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
        <header>              <!-- 맨 위 머리말 -->
            <h1> 시맨틱 구조</h1>                       
            <nav>홈 | 소개 | 연락처</nav>       <!-- 메뉴 모음 -->
        </header>
        <main>                                <!-- 핵심 본문 -->
            <section>                          <!-- 한 주제 덩어리 -->
                <article>                <!-- 완결된 글 하나 -->
                    첫 번째 글 내용
                </article> 
            </section>
        </main>
        <aside>
            곁다리 정보(사이드바)
        </aside>   <!-- 본문 옆 보조 내용 -->
        <footer>
            ⓒ 2026 내 사이트
        </footer>       <!-- 맨 아래 꼬리말 -->
    </body>
</html>

<!-- 
div는 뜻 없는 빈 상자
시맨틱 태그는 이름만 봐도 무슨 구역인지 드러남
핵심: header, nav, main, section, article, aside, footer


네 가지 핵심 구역

• <nav> = 메뉴·길 안내 모음
• <section> = 한 주제로 묶인 덩어리
• <article> = 그 자체로 완결된 글(글·뉴스·카드)
• <aside> = 본문 곁다리(사이드바·광고)
-->
