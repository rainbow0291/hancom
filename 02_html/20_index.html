<!DOCTYPE html>             <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">            <!-- 문서 시작, 한국어 페이지 -->
    <head>                      <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">    <!-- 한글 안 깨지게 -->
        <title>
            div 
        </title>     <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>                  <!-- 화면에 보이는 진짜 내용 칸 -->
    <!-- div = 사진·이름·가격을 한 덩어리(상품 카드)로 묶기 -->
        <div class="card">
            <img src="../02_html/image1.jpg" 
            width="400"
            height="400">
            <h3>패키지 여행 상품</h3>
            <p>가격: 1,000,000원</p>
        </div>
    </body>
</html>

<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/div -->
