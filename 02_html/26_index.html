<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            표 칸 합치기
        </title>  <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
        <h1>표 합치기</h1>
        <table border="1">
            <thead>
                <tr>
                    <th colspan="3"> <!-- 가로 3칸을 하나로 합침 -->
                        성적표 
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr><td rowspan="4">과목</td><td>영어</td><td>90</td></tr>
                <tr><td>수학</td><td>85</td></tr>
                <tr><td>사회</td><td>72</td></tr>
                <tr><td>과학</td><td>89</td></tr>
            </tbody>
        </table>
    </body>
</html>

<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/tbody -->
