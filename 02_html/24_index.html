<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            입력 Type 
        </title>  <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>   
        <h1>입력 Type</h1>
        <form>
            <label>이메일: <input type="email", placeholder="메일"></label>    
            <br>
            <label>비밀번호: <input type="password"></label>    
            <br>
            <label>동의 <input type="checkbox"></label>    
            <br>
            <label>성별: <input type="radio" name="gender">남</label>    
            <label><input type="radio" name="gender">여</label>    
            <br>
            <input type="date"> 
            <br>
            <textarea>
                안녕하세요! 
            </textarea>  
            <br>
            <select>
                <option>서울</option>
                <option>부산</option>
                <option>제주도</option>
            </select> 
        </form>
    </body>
</html>

<!-- 입력칸 종류 (input type)

<input>의 type만 바꾸면 칸 모양이 달라짐 — 회원가입 폼에 딱 맞는 칸 고르기 (STEP 15 보강)

• type="email" — 메일 칸(@ 검사)
• type="password" — 점(••)으로 가려지는 칸
• type="checkbox" — 여러 개 고르기(네모)
• type="radio" — 하나만 고르기(동그라미)
• type="date" — 날짜 고르기(달력)
• <textarea> — 여러 줄 긴 글 칸 
• <select> — 펼쳐서 하나 고르기(드롭다운)
-->

<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/option -->
