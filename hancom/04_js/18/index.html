<!--
=======================================================
  기획서 — SCENTPICK
=======================================================
  프로젝트 이름 : SCENTPICK
  한 줄 소개    : 향수에 관심 있는 사람을 위한 고급 브랜드 TOP 10 소개 사이트

  목표
    - 온라인으로 향수의 종류 및 향 설명에 대한 상세한 정보 제공 
      (오프라인에서 진행하는 구매 전 시향 단계의 부담 감소) 
    - 브랜드별 역사·특징·대표 향수를 카드 클릭 한 번으로 확인할 수 있도록 하기 위함
    - HTML · CSS · JavaScript 기초를 모두 실습하기 위함

  핵심 기능
    1. 카드 목록  — 10개 브랜드를 그리드 카드로 나열
    2. 상세 모달  — 카드 클릭 시 브랜드 설명·대표 향수 팝업 표시
    3. 검색 기능  — 브랜드 이름 실시간 필터링 (input 이벤트)
    4. 즐겨찾기   — 하트 버튼으로 저장·해제 (클래스 메서드)
    5. 카운터     — 전체·즐겨찾기 개수 표시

  JS 학습 요소
    - 변수(const·let) / 조건문(if) / 함수(화살표 함수)
    - 이벤트(click·input)
    - DOM(querySelector·textContent·createElement·appendChild)
    - 배열(filter·forEach) / 객체 / 클래스(class·constructor·메서드)
    - 디버깅(console.log·debugger)

  화면 구성
    header  : 사이트 이름 + 검색창 + 카운터
    main    : 브랜드 카드 그리드
    modal   : 클릭한 브랜드 상세 정보
=======================================================
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCENTPICK — 향수 브랜드 TOP 10</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header>
    <p class="header-sub">Luxury Fragrance Guide</p>
    <h1>SCENTPICK</h1>
    <p class="header-desc">세계 고급 향수 브랜드 TOP 10</p>
    <!-- 검색창 — input 이벤트 -->
    <input type="text" id="search" class="search" placeholder="브랜드 검색...">
    <!-- 카운터 — textContent로 업데이트 -->
    <p class="counter" id="counter"></p>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <!-- 모달 -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-logo" id="modal-logo"></div>
      <p class="modal-country" id="modal-country"></p>
      <h2 class="modal-name" id="modal-name"></h2>
      <p class="modal-founded" id="modal-founded"></p>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-scents">
        <p class="scents-label">대표 향수</p>
        <ul id="modal-scents"></ul>
      </div>
    </div>
  </div>

  <script src="scripts/main.js"></script>
</body>
</html>
