<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            영상 넣기
        </title>    <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>    
        <h1>유튜브 영상 가져오기</h1>                <!-- 화면에 보이는 진짜 내용 칸 -->
    <!-- iframe = 내 페이지 안에 다른 페이지를 작은 네모 창으로 끼워 넣기 -->
    <!-- width·height = 창 크기(가로·세로) / src = 보여줄 영상 embed 주소 -->
        <iframe width="320" height="180"
        src="https://www.youtube.com/embed/aqz-KE-bpKQ"></iframe>
    </body>
</html>
