<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            글자 꾸미기
        </title>  <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>    <!-- 화면에 보이는 진짜 내용 칸 -->
        <h1>글자 꾸미기</h1>                   
        <p><em>기울임 강조</em></p>          <!-- em : 글자가 비스듬히 기울어짐 -->
        <p><mark>형광펜</mark></p>           <!-- mark : 노란 형광펜으로 칠한 느낌 -->
        <p><small>작게 쓰는 글씨</small></p> <!-- small : 글자를 작게 -->
        <p><code>print("hi")</code></p>      <!-- code : 코드처럼 보이는 글씨 -->
        <blockquote>남의 말을 인용합니다.</blockquote>  <!-- blockquote : 남의 말을 인용하는 칸 -->
        <p>H<sub>2</sub>O</p>                <!-- sub : 아래첨자 (작게 아래로) -->
        <p>x<sup>2</sup></p>                 <!-- sup : 위첨자 (작게 위로) -->
    </body>
</html>
