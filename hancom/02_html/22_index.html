<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            경로 설정
        </title>   <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
    <!-- src 경로 = 사진이 어느 폴더에 있는지 길 안내 -->
        <h1>이미지 경로 설정</h1>
        <!-- 현재 폴더 안 image -->
        <img width="150" height="150" src="../02_html/image2.jpg" alt="바닷가 풍경">   <!-- ./ = 지금 폴더 안 img 폴더 -->
        <img width="150" height="150" src="../image4.jpg" alt="야자수">       <!-- ../ = 한 칸 위 폴더 -->
        <!-- HTML에서는 다운로드 경로의 이미지 파일을 불러오지 못함 
         (작업 폴더 안에 폴더 생성하여 관리를 권장함)-->
        <!--<img width="150" height="150" src="./image5.jpg" alt="꽃">    https:// = 인터넷 주소 그대로(절대경로) -->
    </body>
</html>

<!-- 절대주소 or 현재 HTML 파일 기준으로 상대 경로 or 루트 상대 경로(도메인 중심)-->
