<!DOCTYPE html>  <!-- HTML 문서 알려주기 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->

                    좋아하는 것 : 영화

                <li>
                    취미 : 산책

                    여행지 : 미국

                <li>
                    좋아하는 음식 : 한식      
                </li>
            </ul>

        <!-- 페이지 맨 아래 구역 -->
        <footer>
            맨 아래 (저작권 및 연락처)
        </footer>
