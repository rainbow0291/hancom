<!DOCTYPE html>  <!-- HTML 문서 알려주기 -->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
    <head>       <!-- 화면엔 안 보이는 칸-->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게-->
        <title>
            자기 소개
        </title> <!--브라우저 탭에 뜨는 이름-->
    </head>
    <body>     <!-- 화면에 보이는 내용 칸--> 
        <!-- 중첩: 태그 안에 태그 넣기 strong은 글자를 굵게 강조--> 
        <header>
            <h1>
                정유진의 소개 페이지
            </h1>
        </header>
        <!-- 핵심 내용(페이지에 하나)-->
        <main>
            <img src="https://picsum.photos/300/200" alt="내 사진" />
            <p>안녕하세요. 저는 웹 개발을 배우는 정유진입니다.</p>
            <ul>
                <li><strong>취미:</strong>산책</li>
                <li><strong>목표:</strong>멋진 웹사이트 개발</li>
                <li><strong>이메일:</strong></li>
            </ul>
        </main>
        <!-- 맨 아래 꼬리말 -->
        <footer>
            <a href="https://www.google.com">
                깃허브 보러가기 
            </a>
            <a href="https://www.google.com">
                블로그 보러가기 
            </a>
        </footer>    
    </body>     
</html>       

<!--
요소: 여는 태그 + 내용 + 닫는 태그 
빈 요소: <img/>, <meta/>
시맨틱: <header></header>, <main></main>, <footer></footer>
속성: 태그 안에 들어가는 값 예: <a href="https://www.google.com">
-->
