<!DOCTYPE html>             <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">            <!-- 문서 시작, 한국어 페이지 -->
    <head>                      <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">    <!-- 한글 안 깨지게 -->
        <title>
            span 상자
        </title>    <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>                      <!-- 화면에 보이는 진짜 내용 칸 -->
    <!-- span = 글자 사이 일부만 따로 묶는 인라인 상자 (줄 안 바꿈) -->
        <h1>span</h1>
        <p>글자 중 <span class="good">여기만</span> 강조</p>
    </body>
</html>

<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/span -->
