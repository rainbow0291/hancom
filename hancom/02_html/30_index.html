<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
    <head>                    <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
        <title>
            음성 넣기
        </title>    <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body> 
        <h1>음성 파일</h1>
        <audio controls autoplay loop>
            <source src="../02_html/audio.mp4" type="audio/mpeg"> <!-- mp4 후보 -->
            <source src="song.ogg" type="audio/ogg">   <!-- ogg 후보(둘 중 가능한 것 재생) 
        </audio>
    </body>
</html>


<!-- 
내 파일로 음성 재생 (audio·source)

<audio>는 내 음성 파일을 직접 재생, controls를 붙여야 재생 버튼이 뜸 (STEP 29 video와 짝)

음성 — audio + source

<source>로 여러 파일 형식을 적어 두면 브라우저가 재생 가능한 것을 골라 씀 (호환성 대비)

내 음성 파일이 없을 때 — 파파고 번역기의 읽어주기(TTS)를 mp3로 받아 <audio>에 넣기 (STEP 32 개발자도구 활용)

1
papago.naver.com 접속 → 번역할 문장 입력 → F12로 개발자도구 열고 Network 탭 클릭
2
왼쪽 아래 스피커(🔊) 버튼 눌러 읽어주기 재생 → Network 목록에 tts 요청(c_lt_clara_...) 한 줄이 새로 뜸
3
그 줄 클릭 → Headers의 Request URL이 음성 주소 (papago.naver.com/apis/tts/...) — 이게 mp3 파일
4
오디오 플레이어 오른쪽 ⋮ (점 3개) → 다운로드 눌러 mp3 저장 → 내 폴더에 넣고 <source src="...">에 파일명 적기
주의 — 남의 서비스 음성은 개인 학습·실습용으로만, 상업적 재배포 금지 (저작권)  -->
