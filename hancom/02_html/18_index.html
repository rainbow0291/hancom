<!DOCTYPE html>             <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">            <!-- 문서 시작, 한국어 페이지 -->
    <head>                      <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8">    <!-- 한글 안 깨지게 -->
        <title>
            class 이름표
        </title> <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>       <!-- 화면에 보이는 진짜 내용 칸 --> 
        <h1>Class</h1>                 
        <!-- class = 여러 요소가 함께 쓰는 이름표 (같은 값 여러 번 OK) -->
        <p class="text1">맛집 탐방하러 가보자!</p>
        <p class="text2">메뉴를 골라줄래?</p>
        <p class="text3">웨이팅 있을까?</p>
    </body>
</html>
