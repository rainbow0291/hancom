<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기 · Wanted</title>

  <!-- Wanted Sans (display) + Pretendard (UI) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wanted-sans@1.0.3/fonts/webfonts/variable/split/WantedSansVariable.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- brand bloom overlays are appended here at runtime -->
  <div class="bloom-layer" id="bloomLayer" aria-hidden="true"></div>

  <main class="calc" role="application" aria-label="계산기">
    <header class="calc__bar">
      <span class="mark" aria-hidden="true"></span>
      <span class="calc__label">계산기</span>
      <button class="iconbtn" id="themeToggle" type="button" aria-label="다크 모드 켜기">
        <svg class="ic ic--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
        <svg class="ic ic--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
        </svg>
      </button>
    </header>

    <section class="screen" aria-live="polite">
      <div class="screen__expr" id="expr"></div>
      <output class="screen__result" id="result">0</output>
    </section>

    <div class="pad">
      <button class="key key--func" type="button" data-action="clear">AC</button>
      <button class="key key--func" type="button" data-action="negate" aria-label="부호 바꾸기">±</button>
      <button class="key key--func" type="button" data-action="percent" aria-label="퍼센트">%</button>
      <button class="key key--op" type="button" data-op="/" aria-label="나누기">÷</button>

      <button class="key key--num" type="button" data-num="7">7</button>
      <button class="key key--num" type="button" data-num="8">8</button>
      <button class="key key--num" type="button" data-num="9">9</button>
      <button class="key key--op" type="button" data-op="*" aria-label="곱하기">×</button>

      <button class="key key--num" type="button" data-num="4">4</button>
      <button class="key key--num" type="button" data-num="5">5</button>
      <button class="key key--num" type="button" data-num="6">6</button>
      <button class="key key--op" type="button" data-op="-" aria-label="빼기">−</button>

      <button class="key key--num" type="button" data-num="1">1</button>
      <button class="key key--num" type="button" data-num="2">2</button>
      <button class="key key--num" type="button" data-num="3">3</button>
      <button class="key key--op" type="button" data-op="+" aria-label="더하기">+</button>

      <button class="key key--num key--zero" type="button" data-num="0">0</button>
      <button class="key key--num" type="button" data-action="dot" aria-label="소수점">.</button>
      <button class="key key--eq" type="button" data-action="equals" aria-label="계산하기">=</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
