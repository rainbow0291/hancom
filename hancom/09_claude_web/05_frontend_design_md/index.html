<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- global-nav: 44px true-black bar, recedes into the background -->
  <nav class="global-nav" aria-label="Global">
    <span class="global-nav__brand">
      <svg class="global-nav__logo" viewBox="0 0 384 512" aria-hidden="true" focusable="false">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg>
      계산기
    </span>
    <div class="global-nav__utility">
      <span class="global-nav__link">개요</span>
      <span class="global-nav__link">키보드</span>
    </div>
  </nav>

  <!-- Hero tile: parchment gallery surface, calculator presented as the product -->
  <main class="hero">
    <header class="hero__intro">
      <h1 class="hero__headline">계산기</h1>
      <p class="hero__tagline">간결한 계산, 아름답게.</p>
    </header>

    <!-- The calculator IS the product: white body, single system shadow -->
    <section class="calculator" aria-label="Calculator">
      <div class="calculator__display">
        <div class="calculator__expression" id="expression" aria-hidden="true"></div>
        <output class="calculator__result" id="result" aria-live="polite">0</output>
      </div>

      <div class="calculator__keys">
        <button class="key key--utility" data-action="clear">AC</button>
        <button class="key key--utility" data-action="negate">+/−</button>
        <button class="key key--utility" data-action="percent">%</button>
        <button class="key key--operator" data-action="operator" data-operator="÷">÷</button>

        <button class="key key--digit" data-action="digit" data-digit="7">7</button>
        <button class="key key--digit" data-action="digit" data-digit="8">8</button>
        <button class="key key--digit" data-action="digit" data-digit="9">9</button>
        <button class="key key--operator" data-action="operator" data-operator="×">×</button>

        <button class="key key--digit" data-action="digit" data-digit="4">4</button>
        <button class="key key--digit" data-action="digit" data-digit="5">5</button>
        <button class="key key--digit" data-action="digit" data-digit="6">6</button>
        <button class="key key--operator" data-action="operator" data-operator="−">−</button>

        <button class="key key--digit" data-action="digit" data-digit="1">1</button>
        <button class="key key--digit" data-action="digit" data-digit="2">2</button>
        <button class="key key--digit" data-action="digit" data-digit="3">3</button>
        <button class="key key--operator" data-action="operator" data-operator="+">+</button>

        <button class="key key--digit key--zero" data-action="digit" data-digit="0">0</button>
        <button class="key key--digit" data-action="decimal">.</button>
        <button class="key key--operator" data-action="equals">=</button>
      </div>
    </section>
  </main>

  <!-- Footer: parchment, quiet fine print -->
  <footer class="footer">
    <p class="footer__legal">
      Apple 웹 디자인 언어로 제작했습니다. Apple 제품이 아닙니다.
    </p>
  </footer>

  <script src="scripts/main.js"></script>
</body>
</html>
